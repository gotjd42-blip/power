function whDateRefresh(){
  var cont=document.getElementById('wh-tab-content');
  if(!cont)return;
  var wh=ROLE;
  var _disp=wh==='ins'?DB.ins_dispatches:DB.lotto_dispatches;
  var _prod=wh==='ins'?DB.ins_productions:DB.lotto_productions;
  var dayNames=['일','월','화','수','목','금','토'];

  var dates=[];
  for(var i=6;i>=0;i--) dates.push(addDays(today(),-i));

  // 원료별, 발행일별 현재 잔량 집계
  // byMat[materialId][dispatchDate] = 현재 잔량 합계
  var byMat={};
  _disp.forEach(function(d){
    var used=_prod.filter(function(p){return p.dispatchId===d.id;})
      .reduce(function(s,p){return s+(p.inputQty||p.qty);},0);
    var remain=parseFloat(Math.max(0,d.qty-used).toFixed(2));
    if(remain<=0)return;
    if(!byMat[d.materialId]) byMat[d.materialId]={};
    if(!byMat[d.materialId][d.date]) byMat[d.materialId][d.date]=0;
    byMat[d.materialId][d.date]=parseFloat((byMat[d.materialId][d.date]+remain).toFixed(2));
  });

  // 표시할 원료 목록 (재고 있는 것만)
  var rows=[];
  DB.materials.forEach(function(m){
    if(!byMat[m.id])return;
    var dateStocks=byMat[m.id]; // {발행일: 현재잔량}
    var totalRemain=parseFloat(Object.values(dateStocks).reduce(function(s,v){return s+v;},0).toFixed(2));
    if(totalRemain<=0)return;

    // 유통기한: 가장 임박한 잔여 로트 기준
    var minDays=999, minExp='';
    _disp.filter(function(d){return d.materialId===m.id;}).forEach(function(d){
      var used=_prod.filter(function(p){return p.dispatchId===d.id;}).reduce(function(s,p){return s+(p.inputQty||p.qty);},0);
      if(d.qty-used<=0.001)return;
      var expDate=d.expiryDate||addDays(d.date,EXPIRY_DAYS);
      var dl=diffDays(expDate,today());
      if(dl<minDays){minDays=dl;minExp=expDate;}
    });

    rows.push({m:m,dateStocks:dateStocks,remain:totalRemain,daysLeft:minDays,expDate:minExp});
  });
  rows.sort(function(a,b){return a.m.name.localeCompare(b.m.name);});

  if(!rows.length){
    cont.innerHTML='<div class="empty"><div class="ei">✅</div>현재 재고 없음</div>';
    return;
  }

  // 실제 사용된 날짜 컬럼 (최근 7일 중 발행일이 있는 것)
  var usedDates=dates.filter(function(date){
    return rows.some(function(r){return r.dateStocks[date]>0;});
  });
  // 발행일이 7일 이전인 것도 "이전" 컬럼으로 묶기
  var hasBefore=rows.some(function(r){
    return Object.keys(r.dateStocks).some(function(d){return d<dates[0];});
  });

  var dayNames2=['일','월','화','수','목','금','토'];
  var monthGroups=[];var prevM='';
  usedDates.forEach(function(date){
    var ym=date.slice(0,7);
    if(ym!==prevM){monthGroups.push({ym:ym,count:0});prevM=ym;}
    monthGroups[monthGroups.length-1].count++;
  });

  var h='<div style="overflow-x:auto;">';
  h+='<table style="width:100%;border-collapse:collapse;border:1px solid #e2e8f0;">';
  h+='<thead><tr style="background:#1e3a5f;color:#fff;">';
  h+='<th rowspan="2" style="padding:10px 10px;font-size:13px;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,0.15);width:44px;">No.</th>';
  h+='<th rowspan="2" style="padding:10px 16px;font-size:14px;font-weight:700;text-align:left;border:1px solid rgba(255,255,255,0.15);min-width:120px;">원료명</th>';
  h+='<th rowspan="2" style="padding:10px 10px;font-size:13px;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,0.15);width:80px;">유통기한</th>';
  if(hasBefore) h+='<th rowspan="2" style="padding:10px 10px;font-size:11px;font-weight:600;text-align:right;border:1px solid rgba(255,255,255,0.15);opacity:0.8;white-space:nowrap;min-width:75px;">이전<br>발행분</th>';
  monthGroups.forEach(function(mg){
    h+='<th colspan="'+mg.count+'" style="padding:7px 10px;font-size:11px;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,0.15);">'+mg.ym.slice(0,4)+'년 '+parseInt(mg.ym.slice(5))+'월</th>';
  });
  h+='<th rowspan="2" style="padding:10px 10px;font-size:13px;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,0.15);white-space:nowrap;min-width:90px;background:rgba(255,255,255,0.1);">현재<br>잔량</th>';
  h+='</tr><tr style="background:#1e3a5f;color:#fff;border-bottom:2px solid rgba(255,255,255,0.3);">';
  usedDates.forEach(function(date){
    var dn=new Date(date+'T12:00:00').getDay();
    var isSun=dn===0,isSat=dn===6;
    var dc=isSun?'#fc8181':isSat?'#90cdf4':'rgba(255,255,255,0.9)';
    var isToday=date===today();
    h+='<th style="padding:6px 6px;font-size:11px;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,0.15);color:'+dc+';white-space:nowrap;'+(isToday?'background:rgba(255,255,255,0.15);':'')+'">'+parseInt(date.slice(8))+'일<br><span style="font-size:9px;opacity:0.8;">'+dayNames2[dn]+'</span></th>';
  });
  h+='</tr></thead><tbody>';

  rows.forEach(function(row,ri){
    var bg=ri%2===0?'#fff':'#f8fafc';
    var isNearExp=row.daysLeft>=0&&row.daysLeft<=2;
    var isExpired=row.daysLeft<0;
    var rowBg=isExpired?'#fef2f2':isNearExp?'#fff7ed':bg;
    var expColor=isExpired?'#ef4444':isNearExp?'#f59e0b':'#10b981';
    var expLabel=row.daysLeft===999?'-':isExpired?'만료':'D-'+row.daysLeft;

    h+='<tr style="background:'+rowBg+';" onmouseover="this.style.background=\'#eff6ff\'" onmouseout="this.style.background=\''+rowBg+'\'">';
    h+='<td style="padding:12px 10px;font-size:13px;color:#94a3b8;text-align:center;border:1px solid #e2e8f0;font-weight:600;">'+(ri+1)+'</td>';
    h+='<td style="padding:12px 16px;font-size:15px;font-weight:700;color:#1e293b;white-space:nowrap;border:1px solid #e2e8f0;">'+row.m.name+'</td>';
    h+='<td style="padding:12px 10px;font-size:13px;text-align:center;border:1px solid #e2e8f0;"><span style="font-weight:800;color:'+expColor+';">'+expLabel+'</span>'+(row.expDate?'<div style="font-size:11px;color:#94a3b8;margin-top:2px;">'+row.expDate.slice(5).replace('-','/')+'</div>':'')+'</td>';

    // 이전 발행분 합계 컬럼
    if(hasBefore){
      var beforeTotal=parseFloat(Object.keys(row.dateStocks).filter(function(d){return d<dates[0];}).reduce(function(s,d){return s+row.dateStocks[d];},0).toFixed(2));
      h+='<td style="padding:11px 8px;font-size:13px;text-align:right;border:1px solid #e2e8f0;color:'+(beforeTotal>0?'#f59e0b':'#cbd5e1')+';font-weight:'+(beforeTotal>0?'700':'400')+';">'+(beforeTotal>0?fmtKg(beforeTotal)+'KG':'-')+'</td>';
    }

    usedDates.forEach(function(date){
      var v=row.dateStocks[date]||0;
      var isToday=date===today();
      h+='<td style="padding:11px 6px;font-size:13px;text-align:right;border:1px solid #e2e8f0;color:'+(v>0?'#1e293b':'#cbd5e1')+';font-weight:'+(v>0?'700':'400')+';white-space:nowrap;'+(isToday?'background:#eff6ff;':'background:'+(v>0?'':'#f8fafc')+';')+'">'+(v>0?fmtKg(v)+'KG':'-')+'</td>';
    });

    h+='<td style="padding:12px 12px;font-size:16px;font-weight:800;text-align:center;border:1px solid #e2e8f0;color:#2563eb;white-space:nowrap;background:#f0f7ff;">'+fmtKg(row.remain)+'KG</td>';
    h+='</tr>';
  });

  // 합계행
  var totalRemain=parseFloat(rows.reduce(function(s,r){return s+r.remain;},0).toFixed(2));
  h+='<tr style="background:#1e3a5f;color:#fff;font-weight:800;">';
  h+='<td colspan="2" style="padding:12px 16px;font-size:15px;font-weight:800;border:1px solid rgba(255,255,255,0.15);">합계</td>';
  h+='<td style="border:1px solid rgba(255,255,255,0.15);"></td>';
  if(hasBefore){
    var beforeSum=parseFloat(rows.reduce(function(s,r){return s+Object.keys(r.dateStocks).filter(function(d){return d<dates[0];}).reduce(function(a,d){return a+r.dateStocks[d];},0);},0).toFixed(2));
    h+='<td style="padding:11px 8px;font-size:13px;text-align:right;border:1px solid rgba(255,255,255,0.15);">'+fmtKg(beforeSum)+'KG</td>';
  }
  usedDates.forEach(function(date){
    var tot=parseFloat(rows.reduce(function(s,r){return s+(r.dateStocks[date]||0);},0).toFixed(2));
    h+='<td style="padding:11px 6px;font-size:13px;text-align:right;border:1px solid rgba(255,255,255,0.15);white-space:nowrap;">'+(tot>0?fmtKg(tot)+'KG':'-')+'</td>';
  });
  h+='<td style="padding:11px 10px;font-size:14px;text-align:right;border:1px solid rgba(255,255,255,0.15);color:#93c5fd;">'+fmtKg(totalRemain)+'KG</td>';
  h+='</tr></tbody></table></div>';
  h+='<div style="font-size:11px;color:#94a3b8;padding:8px 4px;">각 날짜 컬럼 = 해당 날짜에 발행된 원료의 현재 잔량</div>';
  cont.innerHTML=h;
}

function whDateDownload(){
  var wh=ROLE;
  var _disp=wh==='ins'?DB.ins_dispatches:DB.lotto_dispatches;
  var _prod=wh==='ins'?DB.ins_productions:DB.lotto_productions;
  var whLabel=wh==='ins'?'해원':'로또';
  var ds=document.getElementById('wh-date2-s')?document.getElementById('wh-date2-s').value:'';
  var de=document.getElementById('wh-date2-e')?document.getElementById('wh-date2-e').value:'';
  if(!ds||!de)return;
  var dates=[]; var cur=ds;
  while(cur<=de&&dates.length<=31){dates.push(cur);cur=addDays(cur,1);}
  var beforeDate=addDays(ds,-1);
  var matStocks={};
  DB.materials.forEach(function(m){matStocks[m.id]={};});
  dates.forEach(function(date){
    DB.materials.forEach(function(m){
      var ti=_disp.filter(function(d){return d.materialId===m.id&&d.date<=date;}).reduce(function(s,d){return s+d.qty;},0);
      var tu=_prod.filter(function(p){var d=_disp.find(function(x){return x.id===p.dispatchId;});return d&&d.materialId===m.id&&p.date<=date;}).reduce(function(s,p){return s+(p.inputQty||p.qty);},0);
      matStocks[m.id][date]=parseFloat(Math.max(0,ti-tu).toFixed(2));
    });
  });
  var headers=['No.','원료명',beforeDate.slice(5)+'이전'];
  dates.forEach(function(d){headers.push(d.slice(5).replace('-','/'));});
  headers.push('소계(최종재고)');
  var rows=[['창고: '+whLabel,'기간: '+ds+'~'+de],headers];
  DB.materials.forEach(function(m,mi){
    var before=0;
    var ti=_disp.filter(function(d){return d.materialId===m.id&&d.date<=beforeDate;}).reduce(function(s,d){return s+d.qty;},0);
    var tu=_prod.filter(function(p){var d=_disp.find(function(x){return x.id===p.dispatchId;});return d&&d.materialId===m.id&&p.date<=beforeDate;}).reduce(function(s,p){return s+(p.inputQty||p.qty);},0);
    before=parseFloat(Math.max(0,ti-tu).toFixed(2));
    if(before===0&&dates.every(function(d){return (matStocks[m.id][d]||0)===0;}))return;
    var row=[mi+1,m.name,before];
    dates.forEach(function(d){row.push(matStocks[m.id][d]||0);});
    row.push(matStocks[m.id][de]||0);
    rows.push(row);
  });
  downloadXlsx(rows,'일자별재고현황_'+whLabel+'_'+ds+'~'+de+'.xlsx',whLabel+'일자별재고');
}

function whReqRefresh(){

  var de=document.getElementById('wh-req-date-e')?document.getElementById('wh-req-date-e').value:'';

  var allReqs=DB[wh+'_requests'].filter(function(r){return inRange(r.date);})
    .slice().sort(function(a,b){return b.date.localeCompare(a.date);});

  var whLabel=wh==='ins'?'해원':'로또';

      +'<div style="font-size:11px;color:'+barColor+';text-align:right;margin-top:3px;font-weight:700;">전달률 '+totalPct+'%</div></div>'
    +'</div>'
    +'<div class="stat-box '+(totalPend>0?'red':'green')+'"><div class="stat-icon">⏳</div><div class="sl">미전달 잔량</div><div class="sv '+(totalPend>0?'r':'g')+'">'+fmtKg(totalPend)+'KG</div></div>'
    +'<div class="stat-box"><div class="stat-icon">📝</div><div class="sl">요청서 현황</div>'
      +'<div style="display:flex;gap:8px;margin-top:4px;">'
        +'<span class="badge bwarn">대기 '+pendCnt+'건</span>'

      +'</div>'

  // 원료별 집계 테이블

    +'<thead><tr style="background:var(--g1);">'
      +'<th style="padding:9px 12px;font-size:11px;font-weight:700;color:var(--g4);text-align:left;border-bottom:1px solid var(--g2);">원료명</th>'

  var de=document.getElementById('wh-req-date-e')?document.getElementById('wh-req-date-e').value:'';
  var inRange=function(date){if(!ds&&!de)return true;if(ds&&date<ds)return false;if(de&&date>de)return false;return true;};
  var allReqs=DB[wh+'_requests'].filter(function(r){return inRange(r.date);})
    .slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var rows=[['창고: '+whLabel,'기간: '+((ds&&de)?ds+'~'+de:ds?ds+' 이후':de?de+' 이전':'전체')]];
  rows.push(['요청일','메모','원료명','요청량(KG)','전달량(KG)','전달률(%)','미전달(KG)','상태']);
  allReqs.forEach(function(r){
    r.items.forEach(function(item){
      var del=item.incomedQty||0;
      var pct=item.qty>0?Math.min(100,Math.round(del/item.qty*100)):0;
      var stTxt=pct>=100?'완료':pct>0?'부분전달':'미전달';
      rows.push([r.date,r.memo||'',item.name,parseFloat(item.qty.toFixed(2)),parseFloat(del.toFixed(2)),pct,parseFloat((item.qty-del).toFixed(2)),stTxt]);
    });
  });
  downloadXlsx(rows,'요청현황_'+whLabel+'_'+today()+'.xlsx',whLabel+'요청현황');
}

function delReq(rid){
  if(!confirm('삭제하시겠습니까?\n시트에서도 삭제됩니다.'))return;
  var wh=ROLE;
  var req=DB[wh+'_requests'].find(function(r){return r.id===rid;});
  if(req){
    // 시트에서도 각 항목 삭제
    req.items.forEach(function(item){
      var whLabel=wh==='ins'?'인소싱':'로또';
      fetch(GAS_URL,{method:'POST',body:JSON.stringify({
        action:'deleteRequest',
        date:req.date,
        wh:whLabel,
        matName:item.name
      })});
    });
  }
  DB[wh+'_requests']=DB[wh+'_requests'].filter(function(r){return r.id!==rid;});
  saveDB();goTab('request');
}

// 원료 항목 추가
function pAddMatItem(){
  var mid=document.getElementById('p-disp').value;
  var qty=parseFloat(document.getElementById('p-mat-qty').value)||0;
  if(!mid){alert('원료를 선택하세요');return;}
  if(!qty||qty<=0){alert('사용량을 입력하세요');return;}
  var mat=window._pAvailMats.find(function(m){return m.id===mid;});
  if(!mat)return;
  if(!window._pMatItems) window._pMatItems=[];
  // 이미 있으면 합산
  var existing=window._pMatItems.find(function(x){return x.id===mid;});
  if(existing){existing.qty=parseFloat((existing.qty+qty).toFixed(2));}
  else{window._pMatItems.push({id:mid,name:mat.name,remain:mat.remain,qty:qty});}
  // 초기화
  document.getElementById('p-disp').value='';
  document.getElementById('p-mat-search').value='';
  document.getElementById('p-mat-selected') && (document.getElementById('p-mat-selected').style.display='none');
  document.getElementById('p-mat-qty').value='';
  pRenderMatItems();
  calcY();
}

function pRenderMatItems(){
  var wrap=document.getElementById('p-mat-items');
  if(!wrap)return;
  var items=window._pMatItems||[];
  if(!items.length){wrap.innerHTML='';return;}
  var html='<div style="background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e2e8f0;">'

function calcY(){

function addProd(){
  var wh=ROLE;
  var _disp=wh==='ins'?DB.ins_dispatches:DB.lotto_dispatches;
  var _prod=wh==='ins'?DB.ins_productions:DB.lotto_productions;
  var dt=document.getElementById('p-dt').value||today();
  var matItems=window._pMatItems||[];
  var qty=parseFloat(document.getElementById('p-qty').value)||0;
  var bags=parseInt(document.getElementById('p-bags').value)||0;
  var gram=parseFloat(document.getElementById('p-gram').value)||0;
  var note=document.getElementById('p-note').value.trim();
  var selLabel=document.getElementById('p-prod-selected-label')?document.getElementById('p-prod-selected-label').textContent:'';
  var selName=selLabel?selLabel.replace(/\s*\(\d+g\)$/,''):'';
  var pname=selName||document.getElementById('p-prodname').value.trim();
  if(!matItems.length){alert('원료를 추가하세요');return;}
  if(!pname){alert('제품명을 입력하세요');return;}
  if(!gram){alert('제품 g수를 입력하세요');return;}
  if(!bags){alert('봉 생산량을 입력하세요');return;}

  var totalInput=parseFloat(matItems.reduce(function(s,x){return s+x.qty;},0).toFixed(2));
  var fq=qty>0?qty:(bags*gram/1000);
  var ay=parseFloat((fq/totalInput*100).toFixed(2));

  // 각 원료별로 FIFO 분배 등록
  matItems.forEach(function(item){
    var mid=item.id;
    var iq=item.qty;
    var mat=DB.materials.find(function(m){return m.id===mid;});
    var disps=_disp.filter(function(d){return d.materialId===mid&&getRemain(wh,d)>0.001;})
      .sort(function(a,b){return a.date.localeCompare(b.date);});
    var totalRemain=disps.reduce(function(s,d){return s+getRemain(wh,d);},0);
    if(iq>totalRemain+0.001){
      alert(item.name+' 투입량 초과!\n사용 가능: '+fmtKg(totalRemain)+'KG');return;
    }
    // 이 원료의 비율
    var matRatio=iq/totalInput;
    var remaining=iq;
    disps.forEach(function(d){
      if(remaining<=0.001)return;
      var rm=getRemain(wh,d);
      var use=Math.min(rm,remaining);
      remaining=parseFloat((remaining-use).toFixed(3));
      var ratio=use/totalInput;
      var partQty=parseFloat((fq*ratio).toFixed(3));
      DB[wh+'_productions'].push({
        id:uid(),date:dt,dispatchId:d.id,
        productName:pname,gram:gram,
        inputQty:use,qty:partQty,
        bags:Math.round(bags*matRatio*(use/iq)),
        actualYield:ay,note:note,
        fifo:true,multiMat:true
      });
      addHistory('prod',mid,wh,use,pname,d.id);
    });
    var baseProd=parseFloat((Math.round(bags*matRatio)*(gram/1000)).toFixed(3));
    var overLossVal=parseFloat((iq-baseProd).toFixed(3));
    if(overLossVal<0)overLossVal=0;
    var prodItem={date:dt,productName:pname,gram:gram,matName:mat?mat.name:'?',inputQty:iq,qty:parseFloat((fq*matRatio).toFixed(3)),bags:Math.round(bags*matRatio),actualYield:ay,overLoss:overLossVal,status:'등록',note:note};
    if(wh==='ins')_newItems.ins_prod.push(prodItem);
    else _newItems.lotto_prod.push(prodItem);
  });

  window._pMatItems=[];
  saveDB();goTab('production');
}

function phSetDate(type){
  var s=document.getElementById('ph-date-s');

  if(!s||!e)return;
  var now=new Date();
  if(type==='today'){ s.value=today(); e.value=today(); }
  else if(type==='week'){ s.value=addDays(today(),-6); e.value=today(); }
  else if(type==='month'){
    s.value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
    var last=new Date(now.getFullYear(),now.getMonth()+1,0);
    e.value=last.toISOString().slice(0,10);
  } else { s.value=''; e.value=''; }
  phRender();
}

    var oq=parseFloat(p.qty||0);
    var loss=parseFloat((iq-oq).toFixed(2));
    var lossRate=iq>0?parseFloat((loss/iq*100).toFixed(1)):0;
    var st=ystatus(p.actualYield,m);
    var yc=ycolor(st);
    var bg=i%2===0?'#fff':'var(--g1)';
    h+='<tr style="background:'+bg+';border-bottom:1px solid var(--g2);" onmouseover="this.style.background=\'#eff6ff\'" onmouseout="this.style.background=\''+bg+'\'">'
      +'<td style="padding:10px 12px;font-size:12px;text-align:center;color:var(--g4);white-space:nowrap;">'+p.date.slice(5).replace('-','/')+'</td>'
      +'<td style="padding:10px 12px;font-size:13px;font-weight:700;">'+(p.productName||'-')+'</td>'
      +'<td style="padding:10px 12px;font-size:12px;text-align:center;color:var(--g4);">'+(p.gram?p.gram+'g':'-')+'</td>'
      +'<td style="padding:10px 12px;font-size:12px;color:var(--g5);">'+(m?m.name:'?')+'</td>'
      +'<td style="padding:10px 12px;font-size:13px;text-align:right;font-weight:600;color:var(--orange);">'+fmtKg(iq)+'</td>'
      +'<td style="padding:10px 12px;font-size:13px;text-align:right;font-weight:600;color:var(--green);">'+fmtKg(oq)+'</td>'
      +'<td style="padding:10px 12px;font-size:13px;text-align:right;color:'+(lossRate>7?'var(--red)':'var(--g4)')+';font-weight:'+(lossRate>7?'700':'400')+';">'+fmtKg(loss)+'</td>'
      +'<td style="padding:10px 12px;font-size:13px;text-align:right;font-weight:600;">'+(p.bags||0)+'봉</td>'
      +'<td style="padding:10px 12px;">'
        +'<div style="display:flex;align-items:center;gap:6px;">'
          +'<div style="flex:1;height:6px;background:var(--g2);border-radius:3px;overflow:hidden;">'
            +'<div style="height:100%;width:'+Math.min(100,p.actualYield||0)+'%;background:'+yc+';border-radius:3px;"></div>'
          +'</div>'
          +'<span style="font-size:12px;font-weight:700;color:'+yc+';min-width:38px;text-align:right;">'+(p.actualYield||0)+'%</span>'
        +'</div>'
      +'</td>'
      +'<td style="padding:10px 12px;text-align:center;">'
        +'<span class="badge" style="background:'+yc+'20;color:'+yc+'">'+ylabel(st)+'</span>'
      +'</td>'
      +'<td style="padding:10px 8px;text-align:center;">'
        +'<button class="btn br bsm" onclick="del(\''+wh+'_productions\',\''+p.id+'\',\'history\')">삭제</button>'
      +'</td>'
    +'</tr>';
  });

  // 합계행
  h+='<tr style="background:var(--primary);color:#fff;font-weight:800;">'
    +'<td colspan="4" style="padding:11px 12px;font-size:13px;">합계 ('+ps.length+'건)</td>'
    +'<td style="padding:11px 12px;font-size:13px;text-align:right;color:#fde68a;">'+fmtKg(sumInput)+'</td>'
    +'<td style="padding:11px 12px;font-size:13px;text-align:right;color:#6ee7b7;">'+fmtKg(sumProd)+'</td>'
    +'<td style="padding:11px 12px;font-size:13px;text-align:right;color:#fca5a5;">'+fmtKg(sumLoss)+'</td>'
    +'<td style="padding:11px 12px;font-size:13px;text-align:right;">'+sumBags+'봉</td>'
    +'<td colspan="2" style="padding:11px 12px;">'
      +'<div style="display:flex;align-items:center;gap:6px;">'
        +'<div style="flex:1;height:6px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden;">'
          +'<div style="height:100%;width:'+Math.min(100,sumYld)+'%;background:'+tYldColor+';border-radius:3px;"></div>'
        +'</div>'
        +'<span style="font-size:13px;font-weight:800;color:'+tYldColor+';">'+sumYld+'%</span>'
      +'</div>'
    +'</td>'
    +'<td></td>'
  +'</tr>'
  +'</tbody></table></div></div>';

  wrap.innerHTML=h;
}

function htab(t){
  document.getElementById('ht-prod').className='it'+(t==='prod'?' active':'');
  document.getElementById('ht-hist').className='it'+(t==='hist'?' active':'');
  document.getElementById('hv-prod').style.display=t==='prod'?'block':'none';
  document.getElementById('hv-hist').style.display=t==='hist'?'block':'none';
}

/* ══════════════════════════════════
   창고 제품 관리
══════════════════════════════════ */
function whProducts(){
  var wh=ROLE,pk=wh+'_products',wl=wh==='ins'?'인소싱':'로또';
  var h='<div class="page"><div class="card"><div class="card-head"><div class="card-title">📦 제품 추가</div></div><div class="card-body">';
  h+='<div class="form-row">'
    +'<div class="form-group"><div class="form-label">제품명 *</div><input type="text" class="fi" id="pr-nm" placeholder="예: 제품A"></div>'
    +'<div class="form-group"><div class="form-label">중량 (g) *</div><div class="iw"><input type="number" class="fi u" id="pr-wt" placeholder="500" min="0" step="0.1"><span class="ul">g</span></div></div>'
    +'</div>';
  h+='<div class="form-row">'
    +'<div class="form-group"><div class="form-label">연결 원료</div>'+mSel('pr-mat',true)+'</div>'
    +'<div class="form-group"><div class="form-label">비고</div><input type="text" class="fi" id="pr-note" placeholder="규격 등"></div>'
    +'</div>';
  h+='<button class="btn bg bfull mt8" onclick="addPr()">+ 제품 추가</button></div></div>';
  h+='<div class="sec-title">'+wl+' 제품 목록</div><div class="card">';
  if(!DB[pk].length)h+='<div class="empty"><div class="ei">📦</div>제품 없음</div>';
  else DB[pk].forEach(function(p){
    var m=p.materialId?DB.materials.find(function(x){return x.id===p.materialId;}):null;
    h+='<div class="li"><div class="li-icon ib">📦</div>'
      +'<div class="li-body"><div class="li-title">'+p.name+'</div><div class="li-sub">'+p.weight.toFixed(1)+'g'+(m?' · '+m.name:'')+(p.note?' · '+p.note:'')+'</div></div>'
      +'<button class="btn br bsm" onclick="del(\''+pk+'\',\''+p.id+'\',\'products\')">삭제</button></div>';
  });
  h+='</div></div>';return h;
}
function addPr(){
  var wh=ROLE,nm=document.getElementById('pr-nm').value.trim(),wt=parseFloat(document.getElementById('pr-wt').value)||0;
  if(!nm||!wt){alert('제품명과 중량을 입력하세요');return;}
  var pk=wh+'_products';
  if(DB[pk].find(function(p){return p.name===nm;})){alert('이미 등록됨');return;}
  DB[pk].push({id:uid(),name:nm,weight:wt,materialId:document.getElementById('pr-mat').value||null,note:document.getElementById('pr-note').value.trim()});
  saveDB();goTab('products');
}

/* ══════════════════════════════════
   공통 유틸
══════════════════════════════════ */
function mSel(id,opt){
  return '<select class="fi" id="'+id+'">'
    +(opt?'<option value="">선택 안함</option>':'<option value="">원료 선택</option>')
    +DB.materials.map(function(m){return'<option value="'+m.id+'">'+m.name+'</option>';}).join('')
    +'</select>';
}
function del(key,id,tab){
  if(key==='materials'){var m=DB.materials.find(function(x){return x.id===id;});if(m&&m.fixed){alert('기본 원료는 삭제 불가');return;}}
  if(!confirm('삭제?'))return;
  DB[key]=DB[key].filter(function(x){return x.id!==id;});
  saveDB();goTab(tab);
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(function(el){
  el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('open');});
});

// 고정 원료 자동 등록
var FIXED=['통다리','가슴살','안심','통날개','윙','봉','통정육','북채','사이정육'];
function initFixedMaterials(){
  var ch=false;
  // 날개 제거 (통날개와 중복)
  var nalgaeIdx=DB.materials.findIndex(function(m){return m.name==='날개'&&!m.fixed;});
  if(nalgaeIdx===-1) nalgaeIdx=DB.materials.findIndex(function(m){return m.name==='날개';});
  if(nalgaeIdx!==-1){DB.materials.splice(nalgaeIdx,1);ch=true;}
  FIXED.forEach(function(nm){
    if(!DB.materials.find(function(m){return m.name===nm;})){
      DB.materials.push({id:uid(),name:nm,baseYield:0,minYield:0,fixed:true});ch=true;
    }
  });
  if(ch)saveDB();
  // 오후 11시 자동 완료 처리
  autoCompleteRequests();
}

// 오후 11시 이후 당일 요청서 자동 완료
function autoCompleteRequests(){
  var now=new Date();
  var hour=now.getHours();
  if(hour<23)return; // 오후 11시 미만이면 실행 안 함
  var td=today();
  var changed=false;
  ['ins_requests','lotto_requests'].forEach(function(rk){
    DB[rk].forEach(function(r){
      if(r.status==='pending'&&r.date===td){
        r.status='done';
        changed=true;
      }
    });
  });
  if(changed){
    saveDB();
    console.log('오후 11시 자동 완료 처리 완료');
  }
}

// 1분마다 자동완료 체크 (오후 11시 되면 즉시 처리)
setInterval(function(){
  var now=new Date();
  if(now.getHours()===23&&now.getMinutes()===0){
    autoCompleteRequests();
    if(ROLE) goTab(CUR_TAB); // 현재 탭 새로고침
  }
},60000);
</script>
